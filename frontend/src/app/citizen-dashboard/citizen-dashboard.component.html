<div class="dashboard-container">
  <div class="sidebar">
    <h3>Citizen Portal</h3>
    <p>Welcome, {{ userEmail }}</p>
    <button class="btn btn-logout" (click)="logout()">Logout</button>
  </div>
  
  <div class="main-content">
    <h1>Citizen Dashboard</h1>
    
    <!-- Alerts Section -->
    <div class="section">
      <h2>Current Alerts</h2>
      <div class="alerts-list">
        <div *ngFor="let alert of alerts" class="alert-item">
          <strong>{{ alert.disasterType }}</strong> -
          {{ alert.title }}
          ({{ alert.severity }})
        </div>
        <div *ngIf="alerts.length === 0" class="no-alerts">
          No active alerts in your area
        </div>
      </div>
    </div>
    
    <!-- Rescue Request Section -->
    <div class="section">
      <h2>Request Rescue</h2>
      
      <!-- Success Message -->
      <div *ngIf="rescueResponse" class="alert alert-success">
        {{ rescueResponse }}
      </div>
      
      <!-- Form Fields -->
      <div class="form-group">
        <label>Location:</label>
        <input 
          type="text" 
          [(ngModel)]="location" 
          placeholder="Enter location (e.g., Hyderabad)" 
          class="form-control"
        >
      </div>
      
      <div class="form-group">
        <label>Message:</label>
        <textarea 
          [(ngModel)]="message" 
          placeholder="Describe your situation (e.g., Need help, flooded area)" 
          class="form-control"
          rows="3"
        ></textarea>
      </div>
      
      <!-- Button -->
      <button (click)="requestRescue()" class="btn btn-primary">
        Request Rescue
      </button>
    </div>
    
    <!-- Report Incident Section -->
    <div class="section">
      <h2>Report Incident</h2>
      
      <!-- Success Message -->
      <div *ngIf="incidentResponse" class="alert alert-success">
        {{ incidentResponse }}
      </div>
      
      <!-- Form Fields -->
      <div class="form-group">
        <label>Type:</label>
        <select [(ngModel)]="incidentType" class="form-control">
          <option value="">Select Incident Type</option>
          <option value="flood">Flood</option>
          <option value="earthquake">Earthquake</option>
          <option value="fire">Fire</option>
          <option value="cyclone">Cyclone</option>
          <option value="other">Other</option>
        </select>
      </div>
      
      <div class="form-group">
        <label>Location:</label>
        <input 
          type="text" 
          [(ngModel)]="incidentLocation" 
          placeholder="Enter location" 
          class="form-control"
        >
      </div>
      
      <div class="form-group">
        <label>Description:</label>
        <textarea 
          [(ngModel)]="incidentDescription" 
          placeholder="Describe the incident" 
          class="form-control"
          rows="3"
        ></textarea>
      </div>
      
      <!-- Button -->
      <button (click)="reportIncident()" class="btn btn-danger">
        Report Incident
      </button>
    </div>
  </div>
</div>
