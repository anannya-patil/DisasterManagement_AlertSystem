<div class="profile-container">
  <div class="profile-box">
    <h2>Create Your Profile</h2>
    <p class="subtitle">Complete your profile information</p>
    
    <div *ngIf="errorMessage" class="alert alert-danger">
      {{ errorMessage }}
    </div>
    
    <div *ngIf="successMessage" class="alert alert-success">
      {{ successMessage }}
    </div>
    
    <form (ngSubmit)="onSubmit()" #profileForm="ngForm">
      <div class="form-group">
        <label for="fullName">Full Name</label>
        <input
          type="text"
          id="fullName"
          name="fullName"
          class="form-control"
          [(ngModel)]="fullName"
          required
          #nameInput="ngModel"
        />
        <div *ngIf="nameInput.invalid && nameInput.touched" class="text-danger">
          Full name is required
        </div>
      </div>
      
      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input
          type="tel"
          id="phone"
          name="phone"
          class="form-control"
          [(ngModel)]="phone"
          required
          pattern="[0-9]{10}"
          #phoneInput="ngModel"
        />
        <div *ngIf="phoneInput.invalid && phoneInput.touched" class="text-danger">
          Valid 10-digit phone number is required
        </div>
      </div>
      
      <div class="form-group">
        <label for="region">Region</label>
        <select
          id="region"
          name="region"
          class="form-control"
          [(ngModel)]="region"
          required
        >
          <option value="">Select Region</option>
          <option value="Hyderabad">Hyderabad</option>
          <option value="Mumbai">Mumbai</option>
          <option value="Delhi">Delhi</option>
          <option value="Chennai">Chennai</option>
          <option value="Kolkata">Kolkata</option>
          <option value="Bangalore">Bangalore</option>
        </select>
        <div *ngIf="!region && profileForm.submitted" class="text-danger">
          Region is required
        </div>
      </div>
      
      <button 
        type="submit" 
        class="btn btn-primary btn-block"
        [disabled]="profileForm.invalid || loading"
      >
        <span *ngIf="loading">Creating Profile...</span>
        <span *ngIf="!loading">Create Profile</span>
      </button>
    </form>
  </div>
</div>
