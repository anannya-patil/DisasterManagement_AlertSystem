<div class="dashboard-container">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h3>Admin Portal</h3>
    <p>Welcome, {{ userEmail }}</p>
    
    <button class="btn btn-disasters" (click)="goToDisasters()">
      View Live Disasters
    </button>
    
    <button class="btn btn-logout" (click)="logout()">Logout</button>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main-content">
    
    <div class="section">
      <h2>Pending Disaster Alerts</h2>

      <div class="alerts-list">

        <div *ngFor="let disaster of pendingDisasters" class="alert-item">

          <strong>{{ disaster.disasterType }}</strong> -
          {{ disaster.title }}
          ({{ disaster.severity }})

          <div style="margin-top:8px;">
            Location: {{ disaster.locationName }}
            <span *ngIf="disaster.magnitude">
              | Magnitude: {{ disaster.magnitude }}
            </span>
          </div>

          <div style="margin-top:10px;">
            <button class="btn btn-primary"
                    (click)="approve(disaster.id)">
              Approve
            </button>

            <button class="btn btn-danger"
                    style="margin-left:10px;"
                    (click)="reject(disaster.id)">
              Reject
            </button>

            <button class="btn"
                    style="margin-left:10px; background:#27ae60; color:white;"
                    (click)="resolve(disaster.id)">
              Resolve
            </button>
          </div>

        </div>

        <div *ngIf="pendingDisasters.length === 0"
             class="no-alerts">
          No pending disasters.
        </div>

      </div>
    </div>

    <div class="section">
    <h2>Assign Rescue Task</h2>
    <div class="form-group">
      <label>Disaster ID</label>
      <input class="form-control" type="number" [(ngModel)]="taskDisasterId">
    </div>
    <div class="form-group">
      <label>Responder ID</label>
      <input class="form-control" type="number" [(ngModel)]="taskResponderId">
    </div>
    <div class="form-group">
      <label>Zone</label>
      <input class="form-control" type="text" [(ngModel)]="taskZone">
    </div>
    <div class="form-group">
      <label>Task Description</label>
      <input class="form-control" type="text" [(ngModel)]="taskDescription">
    </div>
    <div class="form-group">
      <label>Latitude</label>
      <input class="form-control" type="number" [(ngModel)]="taskLatitude">
    </div>
    <div class="form-group">
      <label>Longitude</label>
      <input class="form-control" type="number" [(ngModel)]="taskLongitude">
    </div>
    <button class="btn btn-primary" (click)="assignTask()">
      Assign Task
    </button>
    <div *ngIf="taskResponse" class="alert-success" style="margin-top:10px;">
      {{taskResponse}}
    </div>
    </div>
  </div>
</div>
