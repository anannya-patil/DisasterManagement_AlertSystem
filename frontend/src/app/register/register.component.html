<div class="register-container">
  <div class="register-box">
    <h2>Create Account</h2>
    <p class="subtitle">Register for Disaster Management System</p>
    
    <div *ngIf="errorMessage" class="alert alert-danger">
      {{ errorMessage }}
    </div>
    
    <div *ngIf="successMessage" class="alert alert-success">
      {{ successMessage }}
    </div>
    
    <form (ngSubmit)="onSubmit()" #registerForm="ngForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          class="form-control"
          [(ngModel)]="email"
          required
          email
          #emailInput="ngModel"
        />
        <div *ngIf="emailInput.invalid && emailInput.touched" class="text-danger">
          Valid email is required
        </div>
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          class="form-control"
          [(ngModel)]="password"
          required
          minlength="4"
          #passwordInput="ngModel"
        />
        <div *ngIf="passwordInput.invalid && passwordInput.touched" class="text-danger">
          Password must be at least 4 characters
        </div>
      </div>
      
      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input
          type="password"
          id="confirmPassword"
          name="confirmPassword"
          class="form-control"
          [(ngModel)]="confirmPassword"
          required
        />
      </div>
      
      <div class="form-group">
        <label for="role">Role</label>
        <select
          id="role"
          name="role"
          class="form-control"
          [(ngModel)]="role"
          required
        >
          <option value="CITIZEN">Citizen</option>
          <option value="RESPONDER">Responder</option>
          <option value="ADMIN">Admin</option>
        </select>
      </div>
      
      <button 
        type="submit" 
        class="btn btn-primary btn-block"
        [disabled]="registerForm.invalid || loading"
      >
        <span *ngIf="loading">Registering...</span>
        <span *ngIf="!loading">Register</span>
      </button>
    </form>
    
    <div class="login-link">
      Already have an account? <a routerLink="/login">Login here</a>
    </div>
  </div>
</div>
