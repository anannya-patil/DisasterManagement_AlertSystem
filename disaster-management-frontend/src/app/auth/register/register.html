<div class="page">
  <div class="auth-panel glass-panel">
    <h2>Sign Up</h2>
    <p class="subtitle">Create your account</p>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" name="email" placeholder="Enter email" required />
      </div>
      <div class="form-group">
        <label>Phone number</label>
        <input type="tel" [(ngModel)]="phone" name="phone" placeholder="Enter phone number" required />
      </div>
      <div class="form-group">
        <label>Location</label>
        <input type="text" [(ngModel)]="location" name="location" placeholder="City or area" required />
      </div>
      @if (role) {
        <div class="form-group">
          <label>Role</label>
          <input type="text" [value]="roleLabel" readonly class="readonly" />
        </div>
      }
      <button type="submit" class="btn-primary">Sign Up</button>
    </form>

    <p class="footer-text">
      Already have an account? <a routerLink="/login">Sign in</a>
    </p>
  </div>
</div>
