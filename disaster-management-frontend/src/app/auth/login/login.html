<div class="page">
  <div class="auth-panel glass-panel">
    <h2>Sign In</h2>
    <p class="subtitle">Disaster Management & Alert System</p>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" name="email" placeholder="Enter email" required />
      </div>
      <div class="form-group">
        <label>Phone number</label>
        <input type="tel" [(ngModel)]="phone" name="phone" placeholder="Enter phone number" required />
      </div>
      <button type="submit" class="btn-primary">Sign In</button>
    </form>

    <p class="footer-text">
      Don't have an account? <a routerLink="/register">Sign up</a>
    </p>
  </div>
</div>
