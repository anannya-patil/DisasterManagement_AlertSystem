spring.config.import=optional:file:.env

spring.application.name=Disaster_Management

# ===============================
# DATABASE CONFIG
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/disaster_management_infy_internship
spring.datasource.username=root
spring.datasource.password=your_pswd
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

jwt.secret=disaster_management_secret_key_1234567890
jwt.expiration=86400000