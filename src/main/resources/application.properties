spring.application.name=Disaster_Management

# ===============================
# DATABASE CONFIG (MySQL)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/disaster_management_infy_internship?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=YOUR_MYSQL_PASS
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===============================
# JWT CONFIG
# ===============================
jwt.secret=mySuperSecretKeyForDisasterManagementApp2025ThatIsVeryLong123456
jwt.expiration=86400000

# ===============================
# WEBCLIENT CONFIG (Added for External APIs)
# ===============================
spring.webflux.base-url=https://api.openweathermap.org
spring.webflux.timeout=5000

# ===============================
# JPA DDL Auto - Will create new tables
# ===============================
spring.jpa.hibernate.ddl-auto=update